# Download Bing image of the day and deploy to GitHub Pages.
# Runs on schedule (every 6 hours) and on manual trigger.
# Enable GitHub Pages for this repo (Settings → Pages → Source: gh-pages branch).

name: Download Bing image and deploy to Pages

on:
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours
  workflow_dispatch:        # Manual "Run workflow" in Actions tab

jobs:
  download-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push to gh-pages
      pages: write
      id-token: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout gh-pages (existing images)
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: site
          fetch-depth: 0
        continue-on-error: true

      - name: Ensure site directories exist
        run: mkdir -p site/images site/outputs

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download Bing image
        run: |
          export BING_OUTPUT_DIR=site/images
          export BING_REQUEST_TIMEOUT=30
          python app.py

      - name: Generate index.html
        run: |
          cat > site/index.html << 'INDEX'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Bing wallpapers</title>
            <style>
              body { font-family: system-ui, sans-serif; max-width: 1200px; margin: 0 auto; padding: 1rem; }
              h1 { margin-bottom: 0.5rem; }
              .meta { color: #666; margin-bottom: 1.5rem; }
              .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
              .grid a { display: block; }
              .grid img { width: 100%; height: 180px; object-fit: cover; border-radius: 8px; }
            </style>
          </head>
          <body>
            <h1>Bing image of the day</h1>
            <p class="meta">Collected by GitHub Actions. New image every 6 hours.</p>
            <div class="grid">
          INDEX
          for f in site/images/*.png site/outputs/*.png; do
            [ -f "$f" ] || continue
            name=$(basename "$f")
            echo "      <a href=\"images/$name\"><img src=\"images/$name\" alt=\"$name\"></a>" >> site/index.html
          done
          echo '    </div></body></html>' >> site/index.html

      - name: Verify at least one image was downloaded
        run: |
          count_images=$(find site/images -name '*.png' 2>/dev/null | wc -l)
          count_outputs_root=$(find outputs -name '*.png' 2>/dev/null | wc -l)
          count_site_outputs=$(find site/outputs -name '*.png' 2>/dev/null | wc -l)
          total=$((count_images + count_outputs_root + count_site_outputs))
          echo "Found: site/images=$count_images, outputs=$count_outputs_root, site/outputs=$count_site_outputs"
          ls -la site/images/ 2>/dev/null || true
          ls -la site/outputs/ 2>/dev/null || true
          ls -la outputs/ 2>/dev/null || true
          if [ "$total" -eq 0 ]; then
            echo "::error::No image was downloaded. Check the Download Bing image step."
            exit 1
          fi

      - name: Prepare deploy directory (no .gitignore)
        run: |
          mkdir -p deploy/images
          cp site/index.html deploy/
          # App may write to site/images, site/outputs, or outputs/ depending on BING_OUTPUT_DIR
          [ -d site/images ] && cp -n site/images/*.png deploy/images/ 2>/dev/null || true
          [ -d site/outputs ] && cp -n site/outputs/*.png deploy/images/ 2>/dev/null || true
          [ -d outputs ] && cp -n outputs/*.png deploy/images/ 2>/dev/null || true
          echo "Contents of deploy/images:"
          ls -la deploy/images/

      - name: Deploy to GitHub Pages (explicit git commit + push)
        run: |
          # Use the same token that can push; checkout gh-pages in this repo
          git fetch origin gh-pages 2>/dev/null || true
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git checkout gh-pages
            git rm -rf . 2>/dev/null || true
          else
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
          fi
          # Copy built site to repo root (no .gitignore in play on gh-pages)
          cp deploy/index.html .
          cp -r deploy/images .
          git add .
          echo "--- Files that will be committed ---"
          git status
          git diff --cached --stat
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Update gallery: Bing image of the day"
          git push origin gh-pages
