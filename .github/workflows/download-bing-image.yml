# Download Bing image of the day and deploy to GitHub Pages.
# Runs on schedule (every 6 hours) and on manual trigger.
# Enable GitHub Pages for this repo (Settings → Pages → Source: gh-pages branch).

name: Download Bing image and deploy to Pages

on:
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours
  workflow_dispatch:        # Manual "Run workflow" in Actions tab

jobs:
  download-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push to gh-pages
      pages: write
      id-token: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: false

      - name: Ensure site directories exist
        run: mkdir -p site/images site/outputs

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download Bing image
        run: |
          export BING_OUTPUT_DIR=site/images
          export BING_REQUEST_TIMEOUT=30
          python app.py

      - name: Generate index.html
        run: |
          cp scripts/gallery-index-head.html site/index.html
          for f in site/images/*.png site/outputs/*.png; do
            [ -f "$f" ] || continue
            name=$(basename "$f")
            base="${name%.*}"
            echo "    <div class=\"card\"><a href=\"images/$name\" target=\"_blank\" title=\"$base\"><img src=\"thumbs/$base.jpg\" alt=\"$base\" loading=\"lazy\"><span>$base</span></a></div>" >> site/index.html
          done
          cat scripts/gallery-index-tail.html >> site/index.html

      - name: Verify at least one image was downloaded
        run: |
          count_images=$(find site/images -name '*.png' 2>/dev/null | wc -l)
          count_outputs_root=$(find outputs -name '*.png' 2>/dev/null | wc -l)
          count_site_outputs=$(find site/outputs -name '*.png' 2>/dev/null | wc -l)
          total=$((count_images + count_outputs_root + count_site_outputs))
          echo "Found: site/images=$count_images, outputs=$count_outputs_root, site/outputs=$count_site_outputs"
          ls -la site/images/ 2>/dev/null || true
          ls -la site/outputs/ 2>/dev/null || true
          ls -la outputs/ 2>/dev/null || true
          if [ "$total" -eq 0 ]; then
            echo "::error::No image was downloaded. Check the Download Bing image step."
            exit 1
          fi

      - name: Prepare deploy directory (no .gitignore)
        run: |
          mkdir -p deploy/images
          cp site/index.html deploy/
          [ -d site/images ] && cp -n site/images/*.png deploy/images/ 2>/dev/null || true
          [ -d site/outputs ] && cp -n site/outputs/*.png deploy/images/ 2>/dev/null || true
          [ -d outputs ] && cp -n outputs/*.png deploy/images/ 2>/dev/null || true
          echo "Contents of deploy/images:"
          ls -la deploy/images/

      - name: Deploy to GitHub Pages (explicit git commit + push)
        run: |
          cp scripts/gallery-index-head.html scripts/gallery-index-tail.html /tmp/
          mv deploy /tmp/deploy_to_publish
          git fetch origin gh-pages 2>/dev/null || true
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
          fi
          mkdir -p images thumbs
          cp -n /tmp/deploy_to_publish/images/*.png images/ 2>/dev/null || true
          sudo apt-get update -qq && sudo apt-get install -y -qq imagemagick
          for f in images/*.png; do
            [ -f "$f" ] || continue
            base=$(basename "$f" .png)
            convert "$f" -resize 400x400\> -quality 82 "thumbs/${base}.jpg"
          done
          cp /tmp/gallery-index-head.html index.html
          for f in $(ls -t images/*.png 2>/dev/null); do
            [ -f "$f" ] || continue
            name=$(basename "$f")
            base="${name%.*}"
            echo "    <div class=\"card\"><a href=\"images/$name\" target=\"_blank\" title=\"$base\"><img src=\"thumbs/$base.jpg\" alt=\"$base\" loading=\"lazy\"><span>$base</span></a></div>" >> index.html
          done
          cat /tmp/gallery-index-tail.html >> index.html
          git add .
          echo "--- Files that will be committed ---"
          git status
          git diff --cached --stat
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Update gallery: Bing image of the day" || true
          git push origin gh-pages
