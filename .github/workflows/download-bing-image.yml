# Download Bing image of the day and deploy to GitHub Pages.
# Keeps full-resolution images; caps site at ~300MB and evicts oldest by date (FIFO).
# Runs on schedule and on manual trigger.

name: Download Bing image and deploy to Pages

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  download-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: false

      - name: Ensure site directories exist
        run: mkdir -p site/images site/outputs

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download Bing image
        run: |
          export BING_OUTPUT_DIR=site/images
          export BING_REQUEST_TIMEOUT=30
          python app.py

      - name: Verify download
        run: |
          n=$(find site/images -name '*.png' 2>/dev/null | wc -l)
          if [ "$n" -eq 0 ]; then echo "::error::No image downloaded"; exit 1; fi

      - name: Prepare deploy (full-res + thumbs)
        run: |
          mkdir -p deploy/images deploy/thumbs
          sudo apt-get update -qq && sudo apt-get install -y -qq imagemagick
          for f in site/images/*.png site/outputs/*.png; do
            [ -f "$f" ] || continue
            name=$(basename "$f")
            cp "$f" "deploy/images/$name"
            convert "$f" -resize 400x400\> -quality 82 "deploy/thumbs/${name}.jpg"
          done
          cp scripts/gallery-index-head.html scripts/gallery-index-tail.html scripts/update-gallery-metadata.py /tmp/

      - name: Deploy to GitHub Pages
        run: |
          rm -rf site
          mv deploy /tmp/deploy_to_publish
          git fetch origin gh-pages 2>/dev/null || true
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
          fi
          mkdir -p images thumbs
          cp -n /tmp/deploy_to_publish/images/*.png images/ 2>/dev/null || true
          cp -n /tmp/deploy_to_publish/thumbs/*.jpg thumbs/ 2>/dev/null || true
          NEW_FILE=$(ls /tmp/deploy_to_publish/images/*.png 2>/dev/null | head -1)
          if [ -n "$NEW_FILE" ] && [ -f "images/$(basename "$NEW_FILE")" ]; then
            NAME=$(basename "$NEW_FILE")
            BYTES=$(stat -c%s "images/$NAME" 2>/dev/null || echo 0)
            DATE=$(date -u +%Y-%m-%d)
            python3 /tmp/update-gallery-metadata.py . "images/$NAME" "$DATE" "$BYTES" > /tmp/sorted_images.txt
          else
            python3 /tmp/update-gallery-metadata.py . > /tmp/sorted_images.txt
          fi
          cp /tmp/gallery-index-head.html index.html
          while IFS= read -r key; do
            [ -z "$key" ] || [ ! -f "$key" ] && continue
            name=$(basename "$key")
            base="${name%.*}"
            echo "    <div class=\"card\"><a href=\"$key\" target=\"_blank\" title=\"$base\"><img src=\"thumbs/${name}.jpg\" alt=\"$base\" loading=\"lazy\"><span>$base</span></a></div>" >> index.html
          done < /tmp/sorted_images.txt
          cat /tmp/gallery-index-tail.html >> index.html
          git add .
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Update gallery: Bing image of the day" || true
          git push origin gh-pages