# Download Bing image of the day and deploy to GitHub Pages.
# Runs on schedule (every 6 hours) and on manual trigger.
# Enable GitHub Pages for this repo (Settings → Pages → Source: gh-pages branch).

name: Download Bing image and deploy to Pages

on:
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours
  workflow_dispatch:        # Manual "Run workflow" in Actions tab

jobs:
  download-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Checkout gh-pages (existing images)
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: site
          fetch-depth: 0
        continue-on-error: true

      - name: Ensure site/outputs exists
        run: mkdir -p site/outputs

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download Bing image
        env:
          BING_OUTPUT_DIR: site/outputs
          BING_REQUEST_TIMEOUT: "30"
        run: python app.py

      - name: Generate index.html
        run: |
          cat > site/index.html << 'INDEX'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Bing wallpapers</title>
            <style>
              body { font-family: system-ui, sans-serif; max-width: 1200px; margin: 0 auto; padding: 1rem; }
              h1 { margin-bottom: 0.5rem; }
              .meta { color: #666; margin-bottom: 1.5rem; }
              .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
              .grid a { display: block; }
              .grid img { width: 100%; height: 180px; object-fit: cover; border-radius: 8px; }
            </style>
          </head>
          <body>
            <h1>Bing image of the day</h1>
            <p class="meta">Collected by GitHub Actions. New image every 6 hours.</p>
            <div class="grid">
          INDEX
          for f in site/outputs/*.png; do
            [ -f "$f" ] || continue
            name=$(basename "$f")
            echo "      <a href=\"outputs/$name\"><img src=\"outputs/$name\" alt=\"$name\"></a>" >> site/index.html
          done
          echo '    </div></body></html>' >> site/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          force_orphan: true
