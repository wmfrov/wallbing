# Build and deploy a CDN-backed Bing image gallery to GitHub Pages.
# Runs build_gallery.py from the repo; all images served from Bing CDN.

name: Update Bing wallpaper gallery

on:
  schedule:
    - cron: '30 15 * * *'
  workflow_dispatch:
    inputs:
      backfill_npanuhin:
        description: 'One-time backfill from npanuhin archive (run once, then never again)'
        type: boolean
        default: false

jobs:
  update-gallery:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: python3 build_gallery.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BACKFILL_NPANUHIN: ${{ inputs.backfill_npanuhin }}
